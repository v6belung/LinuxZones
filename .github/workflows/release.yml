name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build .deb
        run: bash build-deb.sh

      - name: Get version
        id: ver
        run: |
          echo "version=$(python3 -c "
          import re
          print(re.search(r'__version__ = [\"\'](.*?)[\"\']', open('linuxzones/__init__.py').read()).group(1))
          ")" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "LinuxZones ${{ github.ref_name }}" \
            --generate-notes \
            "linuxzones_${{ steps.ver.outputs.version }}_all.deb"
